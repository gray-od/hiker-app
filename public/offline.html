<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>ProHikes — Офлайн</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Arial,Helvetica,sans-serif;background:#f4f4f5;color:#18181b;padding:env(safe-area-inset-top,0) 0 env(safe-area-inset-bottom,0)}
.header{background:#75a93a;color:#fff;padding:16px;text-align:center;font-size:18px;font-weight:700}
.header small{display:block;font-size:12px;font-weight:400;opacity:.8;margin-top:4px}
.container{max-width:600px;margin:0 auto;padding:12px}
.empty{text-align:center;color:#71717a;padding:40px 16px;font-size:14px}
.section-title{font-size:13px;font-weight:600;color:#71717a;text-transform:uppercase;letter-spacing:.5px;margin:16px 0 8px;padding:0 4px}
.card{background:#fff;border:1px solid #e4e4e7;border-radius:12px;margin-bottom:8px;overflow:hidden}
.card-header{padding:12px 14px;cursor:pointer;display:flex;align-items:center;justify-content:space-between}
.card-header:active{background:#f4f4f5}
.card-name{font-size:15px;font-weight:600;color:#18181b}
.card-meta{font-size:12px;color:#71717a;margin-top:2px}
.card-arrow{color:#a1a1aa;font-size:18px;transition:transform .2s}
.card-arrow.open{transform:rotate(180deg)}
.card-body{display:none;border-top:1px solid #e4e4e7;padding:10px 14px;font-size:13px}
.card-body.open{display:block}
.day{margin-bottom:10px}
.day-title{font-weight:600;color:#75a93a;font-size:13px;margin-bottom:4px;border-bottom:1px solid #e4e4e7;padding-bottom:3px}
.meal-type{font-weight:600;color:#52525b;font-size:12px;margin:6px 0 2px}
.entry{display:flex;justify-content:space-between;padding:2px 0;color:#3f3f46}
.entry-name{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.entry-info{flex-shrink:0;color:#71717a;margin-left:8px;white-space:nowrap}
.item{display:flex;align-items:center;gap:8px;padding:4px 0;border-bottom:1px solid #f4f4f5}
.item:last-child{border:none}
.item-name{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#3f3f46}
.item-weight{flex-shrink:0;color:#71717a;font-size:12px;font-variant-numeric:tabular-nums}
.badge{display:inline-block;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:500}
.total{font-weight:600;color:#18181b;text-align:right;padding-top:6px;margin-top:6px;border-top:1px solid #e4e4e7;font-size:13px}
.btn-back{display:block;text-align:center;margin:20px auto;padding:12px 24px;background:#75a93a;color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:600;text-decoration:none;cursor:pointer}
@media(prefers-color-scheme:dark){
body{background:#09090b;color:#e4e4e7}
.card{background:#18181b;border-color:#27272a}
.card-header:active{background:#27272a}
.card-name{color:#e4e4e7}
.day-title{border-color:#27272a}
.entry{color:#d4d4d8}
.item{border-color:#27272a}
.item-name{color:#d4d4d8}
.total{color:#e4e4e7;border-color:#27272a}
.card-body{border-color:#27272a}
}
</style>
</head>
<body>
<div class="header">
ProHikes
<small>📡 Офлайн — збережені дані</small>
</div>
<div class="container" id="app"></div>
<script>
const MEAL_TYPES={breakfast:'🌅',lunch:'☀️',snack:'🥜',dinner:'🌙'};
const MEAL_NAMES={breakfast:'Сніданок',lunch:'Обід',snack:'Перекус',dinner:'Вечеря'};

function fw(g){return g>=1000?(g/1000).toFixed(1)+' кг':g+' г'}

function render(){
const el=document.getElementById('app');
const meals=[];const lists=[];
for(let i=0;i<localStorage.length;i++){
const k=localStorage.key(i);
if(k&&k.startsWith('offline_meal_')){try{const d=JSON.parse(localStorage.getItem(k));meals.push({id:k.replace('offline_meal_',''),data:d})}catch{}}
if(k&&k.startsWith('offline_list_')){try{const d=JSON.parse(localStorage.getItem(k));lists.push({id:k.replace('offline_list_',''),data:d})}catch{}}
}

if(!meals.length&&!lists.length){
el.innerHTML='<div class="empty">Немає збережених даних.<br>Відкрийте розкладку або список з інтернетом,<br>щоб зберегти для офлайну.</div>';
return;
}

let h='';

if(meals.length){
h+='<div class="section-title">🍽 Розкладки харчування</div>';
meals.forEach((m,mi)=>{
const plan=m.data.plan||{};
const days=m.data.days||[];
const totalW=days.reduce((s,d)=>(d.meal_entries||[]).reduce((ss,e)=>ss+e.weight_g,s),0);
const totalC=days.reduce((s,d)=>(d.meal_entries||[]).reduce((ss,e)=>ss+e.calories,s),0);
h+='<div class="card"><div class="card-header" onclick="toggle(\'m'+mi+'\')"><div><div class="card-name">'+esc(plan.name||'—')+'</div>';
h+='<div class="card-meta">'+(plan.days_count||days.length)+' дн. · '+(plan.people_count||1)+' люд. · '+totalC+' ккал · '+fw(totalW)+'</div></div>';
h+='<span class="card-arrow" id="a_m'+mi+'">▼</span></div>';
h+='<div class="card-body" id="m'+mi+'">';
days.forEach(day=>{
const entries=day.meal_entries||[];
h+='<div class="day"><div class="day-title">День '+(day.day_number||'?')+'</div>';
const grouped={};entries.forEach(e=>{if(!grouped[e.meal_type])grouped[e.meal_type]=[];grouped[e.meal_type].push(e)});
['breakfast','lunch','snack','dinner'].forEach(mt=>{
if(!grouped[mt]||!grouped[mt].length)return;
h+='<div class="meal-type">'+(MEAL_TYPES[mt]||'')+' '+(MEAL_NAMES[mt]||mt)+'</div>';
grouped[mt].forEach(e=>{
h+='<div class="entry"><span class="entry-name">'+esc(e.name)+'</span><span class="entry-info">'+e.weight_g+'г · '+e.calories+'ккал</span></div>';
});
});
const dw=entries.reduce((s,e)=>s+e.weight_g,0);
const dc=entries.reduce((s,e)=>s+e.calories,0);
h+='<div class="total">'+dc+' ккал · '+fw(dw)+'</div></div>';
});
h+='</div></div>';
});
}

if(lists.length){
h+='<div class="section-title">🎒 Списки спорядження</div>';
lists.forEach((l,li)=>{
const list=l.data.list||{};
const items=l.data.items||[];
const totalW=items.reduce((s,it)=>(it.gear_item?.weight_g||0)*(it.quantity||1),0);
h+='<div class="card"><div class="card-header" onclick="toggle(\'l'+li+'\')"><div><div class="card-name">'+esc(list.name||'—')+'</div>';
h+='<div class="card-meta">'+items.length+' предм. · '+fw(totalW)+'</div></div>';
h+='<span class="card-arrow" id="a_l'+li+'">▼</span></div>';
h+='<div class="card-body" id="l'+li+'">';
items.forEach(it=>{
const gi=it.gear_item||{};
const w=(gi.weight_g||0)*(it.quantity||1);
h+='<div class="item"><span class="item-name">'+(it.quantity>1?it.quantity+'× ':'')+esc(gi.name||'—')+'</span><span class="item-weight">'+fw(w)+'</span></div>';
});
h+='<div class="total">'+fw(totalW)+'</div>';
h+='</div></div>';
});
}

el.innerHTML=h;
}

function toggle(id){
const b=document.getElementById(id);
const a=document.getElementById('a_'+id);
if(b){b.classList.toggle('open');if(a)a.classList.toggle('open')}
}

function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}

render();
</script>
</body>
</html>
